name: AIEmail
options:
  bundleIdPrefix: com.aibox
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
    INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"

targets:
  AIEmail:
    type: application
    platform: iOS
    sources:
      - path: AIEmail
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aibox.aiemail
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: AI邮箱
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: YES
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"
        SWIFT_EMIT_LOC_STRINGS: YES
        INFOPLIST_KEY_NSMailAccountDescription: "AI邮箱需要访问您的邮箱账户"
        INFOPLIST_KEY_NSMailAccessUsageDescription: "AI邮箱需要读取您的邮件以提供智能摘要和搜索功能"
    dependencies:
      - package: SQLite.swift
        product: SQLite
      - package: Alamofire

  AIEmailTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: AIEmailTests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: AIEmail
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aibox.aiemail.tests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/AIEmail.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/AIEmail"
        BUNDLE_LOADER: "$(TEST_HOST)"

packages:
  SQLite.swift:
    url: https://github.com/stephencelis/SQLite.swift.git
    from: "0.15.0"
  Alamofire:
    url: https://github.com/Alamofire/Alamofire.git
    from: "5.9.0"
